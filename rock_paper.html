<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f4;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Rock Paper Scissors</h1>

  <button onclick="playGame('rock')">Rock</button>
  <button onclick="playGame('paper')">Paper</button>
  <button onclick="playGame('scissors')">Scissors</button>
  <button onclick="playGame('bomb')">💣 Bomb</button>

  <div id="result"></div>

  <script>
    // Computer choice
    const getComputerChoice = () => {
      const randomNumber = Math.floor(Math.random() * 3);

      if (randomNumber === 0) return 'rock';
      if (randomNumber === 1) return 'paper';
      return 'scissors';
    };

    // Winner logic
    const determineWinner = (userChoice, computerChoice) => {
      if (userChoice === 'bomb') {
        return '💣 You used the bomb! You win!';
      }

      if (userChoice === computerChoice) {
        return 'It\'s a tie!';
      }

      if (userChoice === 'rock') {
        return computerChoice === 'paper' ? 'Computer wins!' : 'You win!';
      }

      if (userChoice === 'paper') {
        return computerChoice === 'scissors' ? 'Computer wins!' : 'You win!';
      }

      if (userChoice === 'scissors') {
        return computerChoice === 'rock' ? 'Computer wins!' : 'You win!';
      }
    };

    // Main game
    const playGame = (userChoice) => {
      const computerChoice = getComputerChoice();
      const result = determineWinner(userChoice, computerChoice);

      document.getElementById('result').innerHTML =
        `You: ${userChoice} <br>
         Computer: ${computerChoice} <br><br>
         ${result}`;
    };
  </script>
  
  <a href="index.html">
    <button>
      Back to main page.
    </button>
  </a>

</body>
</html>
