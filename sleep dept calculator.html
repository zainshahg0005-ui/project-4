<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sleep Debt Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      min-height: 50px;
    }
  </style>
</head>
<body>

  <h1>Sleep Debt Calculator</h1>

  <button onclick="calculateSleepDebt()">Check Sleep Status</button>

  <div id="output"></div>

  <script>
    function getSleepHours(day) {
      switch (day.toLowerCase()) {
        case 'monday': return 8;
        case 'tuesday': return 7;
        case 'wednesday': return 10;
        case 'thursday': return 8;
        case 'friday': return 5;
        case 'saturday': return 9;
        case 'sunday': return 7;
        default: return 0;
      }
    }

    function getActualSleepHours() {
      return (
        getSleepHours('monday') +
        getSleepHours('tuesday') +
        getSleepHours('wednesday') +
        getSleepHours('thursday') +
        getSleepHours('friday') +
        getSleepHours('saturday') +
        getSleepHours('sunday')
      );
    }

    function getIdealSleepHours(idealHoursPerNight = 8) {
      return idealHoursPerNight * 7;
    }

    function calculateSleepDebt() {
      const actualSleepHours = getActualSleepHours();
      const idealSleepHours = getIdealSleepHours(8);
      const difference = actualSleepHours - idealSleepHours;

      let message = "";

      if (actualSleepHours === idealSleepHours) {
        message = "You got the perfect amount of sleep.";
      } 
      else if (actualSleepHours > idealSleepHours) {
        message = `You got more sleep than needed by ${difference} hours.`;
      } 
      else {
        message = `You should get some rest. You are short by ${Math.abs(difference)} hours.`;
      }

      document.getElementById("output").innerText = message;
    }
  </script>

<a href="index.html">
  <button>
    Back to main page.
  </button>
</a>
<p>Note: change the value in "function getSleepHours(day): " cuz the value is hard coded </p>

</body>
</html>
